  <!-- Text bm -->
  <text x="50" y="65" 
        font-family="Inter, Arial, sans-serif" 
        font-size="45" 
        font-weight="bold" 
        fill="white" 
        text-anchor="middle">
    bm
  </text>
  
  <!-- Decorative outer border -->
